openapi: 3.0.4

info:
  title: Car Renting API
  version: 0.1.0

servers:
  - url: http://localhost:3000/
    description: base url

tags:
  - name: Authentication
    description: User registration and login

paths:
  /api/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              example:
                first_name: John
                last_name: Doe
                email: JohnDoe@example.com
                password: password
                phone_number: "+111111111"
      responses:
        "201":
          description: Success
        "400":
          description: Bad Request

  /api/login:
    post:
      tags:
        - Authentication
      summary: Log in user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              example:
                email: JohnDoe@example.com
                password: password
      responses:
        "200":
          description: Login successful
        "401":
          description: Wrong credentials
        "400":
          description: Bad Request
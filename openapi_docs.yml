openapi: 3.0.0

info:
  title: Car Renting API
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: base url

tags:
  - name: Authentication
    description: User registration and login
  - name: Email Verification
    description: User Email Verification

paths:
  /api/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                first_name: John
                last_name: Doe
                email: JohnDoe@example.com
                password: password
                phone_number: "+111111111"
                agreed_terms: true
      responses:
        "201":
          description: Success
        "400":
          description: Bad Request

  /api/login:
    post:
      tags:
        - Authentication
      summary: Log in user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                email: JohnDoe@example.com
                password: password
      responses:
        "200":
          description: Login successful
        "401":
          description: Wrong credentials
        "400":
          description: Bad Request

  /api/verify:
    post:
      tags:
        - Email Verification
      summary: Verify Email Address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                token: token
      responses:
        "200":
          description: Verification Successful
        "401":
          description: Invalid token
        "500":
          description: Server failure

  /api/verify/refresh:
    post:
      tags:
        - Email Verification
      summary: Refresh verification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                token: token
      responses:
        "200":
          description: Token refresh successful
        "401":
          description: Invalid token
        "500":
          description: Server failure